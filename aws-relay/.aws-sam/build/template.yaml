AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: "Claude Relay \u2014 WebSocket relay for cross-machine Claude Code sessions"
Globals:
  Function:
    Runtime: python3.12
    MemorySize: 256
    Timeout: 29
Resources:
  RelayWebSocketApi:
    Type: AWS::ApiGatewayV2::Api
    Properties:
      Name: claude-relay
      ProtocolType: WEBSOCKET
      RouteSelectionExpression: $request.body.type
  ConnectRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId:
        Ref: RelayWebSocketApi
      RouteKey: $connect
      AuthorizationType: NONE
      Target:
        Fn::Sub: integrations/${RelayIntegration}
  DisconnectRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId:
        Ref: RelayWebSocketApi
      RouteKey: $disconnect
      AuthorizationType: NONE
      Target:
        Fn::Sub: integrations/${RelayIntegration}
  DefaultRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId:
        Ref: RelayWebSocketApi
      RouteKey: $default
      AuthorizationType: NONE
      Target:
        Fn::Sub: integrations/${RelayIntegration}
  RelayIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId:
        Ref: RelayWebSocketApi
      IntegrationType: AWS_PROXY
      IntegrationUri:
        Fn::Sub: arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${RelayFunction.Arn}/invocations
  Deployment:
    Type: AWS::ApiGatewayV2::Deployment
    DependsOn:
    - ConnectRoute
    - DisconnectRoute
    - DefaultRoute
    Properties:
      ApiId:
        Ref: RelayWebSocketApi
  Stage:
    Type: AWS::ApiGatewayV2::Stage
    Properties:
      ApiId:
        Ref: RelayWebSocketApi
      StageName: prod
      DeploymentId:
        Ref: Deployment
  RelayFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: claude-relay-handler
      Handler: app.handler
      CodeUri: RelayFunction
      Environment:
        Variables:
          CONNECTIONS_TABLE:
            Ref: ConnectionsTable
          PAIRS_TABLE:
            Ref: PairsTable
          CONNECTION_MAP_TABLE:
            Ref: ConnectionMapTable
      Policies:
      - DynamoDBCrudPolicy:
          TableName:
            Ref: ConnectionsTable
      - DynamoDBCrudPolicy:
          TableName:
            Ref: PairsTable
      - DynamoDBCrudPolicy:
          TableName:
            Ref: ConnectionMapTable
      - Statement:
        - Effect: Allow
          Action:
          - execute-api:ManageConnections
          Resource:
            Fn::Sub: arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${RelayWebSocketApi}/*
    Metadata:
      SamResourceId: RelayFunction
  RelayFunctionPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName:
        Ref: RelayFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn:
        Fn::Sub: arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${RelayWebSocketApi}/*
  ConnectionsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: RelayConnections
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
      - AttributeName: session_id
        AttributeType: S
      KeySchema:
      - AttributeName: session_id
        KeyType: HASH
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true
  PairsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: RelayPairs
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
      - AttributeName: session_id
        AttributeType: S
      KeySchema:
      - AttributeName: session_id
        KeyType: HASH
  ConnectionMapTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: RelayConnectionMap
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
      - AttributeName: connection_id
        AttributeType: S
      KeySchema:
      - AttributeName: connection_id
        KeyType: HASH
Outputs:
  WebSocketURL:
    Description: WebSocket endpoint for claude-relay
    Value:
      Fn::Sub: wss://${RelayWebSocketApi}.execute-api.${AWS::Region}.amazonaws.com/prod
  RelayServerURL:
    Description: Value for RELAY_SERVER_URL (use wss:// for Go client)
    Value:
      Fn::Sub: wss://${RelayWebSocketApi}.execute-api.${AWS::Region}.amazonaws.com/prod
